<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日邀请函</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: "PingFang SC","Microsoft YaHei";
    overflow:hidden;
}

#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 1000;
    animation: fadeOut 2s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.page {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: rgba(179,0,0,0.9);
    color:white;
    text-align:center;
    padding:20px;
    transition:transform 0.6s ease;
}

h1 {
    font-size:34px;
    color: gold;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow:0 0 5px gold; }
    to { text-shadow:0 0 20px gold,0 0 40px gold; }
}

h2 { font-size:24px; margin:10px 0; }
p { font-size:18px; line-height:1.6; }

.photo {
    width:240px;
    height:300px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: gold;
    display:flex;
    align-items:center;
    justify-content:center;
}

.fireworks {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 999;
    pointer-events: none;
}

.firework {
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation: explode 1s forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="intro"></div>

<div class="fireworks" id="fireworks"></div>

<div class="music-btn" onclick="toggleMusic()">🎵</div>
<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<!-- 页面 -->

<div class="page">
    <h1>🎂 生日邀请函 🎂</h1>
    <h2>一起庆祝 · 一起开心</h2>
</div>

<div class="page">
    <img src="mom1.jpg" class="photo">
    <h2>生活里的温柔瞬间</h2>
</div>

<div class="page">
    <img src="mom2.jpg" class="photo">
    <h2>时间沉淀出的从容与优雅</h2>
</div>

<div class="page">
    <p>
        在这个特别的日子里<br><br>
        我们准备了一场简单而温暖的相聚<br><br>
        期待与你一起<br>
        分享这份喜悦
    </p>
</div>

<div class="page">
    <h2 style="color:gold;">陈丽（陈八妹）诚挚邀请</h2>
    <p>
        📅 2026年3月29日中午12点<br><br>
        📍 重庆市九龙坡区西彭镇利川大酒店
    </p>
</div>

<div class="page">
    <h2 style="color:gold;">🎉 不见不散 🎉</h2>
</div>

<script>
let pages = document.querySelectorAll('.page');
let current = 0;
let startY = 0;
let moving = false;

function update(){
    pages.forEach((p,i)=>{
        let offset = (i-current)*100;
        let scale = i===current ? 1 : 0.9;

        p.style.transform = `translateY(${offset}%) scale(${scale})`;
        p.style.opacity = i===current ? 1 : 0.5;
    });
}
update();

document.addEventListener('touchstart',e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener('touchend',e=>{
    if(moving) return;
    let diff = startY - e.changedTouches[0].clientY;

    if(Math.abs(diff)>50){
        moving = true;

        if(diff>0 && current<pages.length-1) current++;
        else if(diff<0 && current>0) current--;

        update();
        setTimeout(()=>moving=false,500);
    }
});

let audio = document.getElementById("bgm");
function toggleMusic(){ audio.play(); }

function createFirework(){
    const c = document.getElementById("fireworks");
    let x = Math.random()*window.innerWidth;
    let y = Math.random()*window.innerHeight*0.5;

    for(let i=0;i<20;i++){
        let p = document.createElement("div");
        p.className="firework";

        let angle = Math.random()*2*Math.PI;
        let d = Math.random()*80+40;

        p.style.left = x+"px";
        p.style.top = y+"px";

        p.style.setProperty('--x', Math.cos(angle)*d+"px");
        p.style.setProperty('--y', Math.sin(angle)*d+"px");

        p.style.background = Math.random()>0.5?"gold":"#ff4d4d";

        c.appendChild(p);

        setTimeout(()=>p.remove(),1000);
    }
}

setInterval(createFirework,700);
</script>

</body>
</html>
