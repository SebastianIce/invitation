<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿宴邀请函</title>

<!-- 微信分享优化 -->
<meta name="description" content="诚邀您参加寿宴">
<meta name="keywords" content="生日,寿宴,邀请函">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: "PingFang SC","Microsoft YaHei";
    overflow:hidden;
}

/* 页面 */
.page {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#b30000,#660000);
    color:white;
    text-align:center;
    padding:20px;
    transition:transform 0.6s ease;
    z-index:1;
}

/* 标题 */
h1 { font-size:34px; color:gold; }
h2 { font-size:24px; margin:10px 0; }
p { font-size:18px; line-height:1.6; }

/* 照片 */
.photo {
    width:240px;
    height:300px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* 音乐按钮 */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: gold;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 烟花 */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<!-- 页面 -->
<div class="page"> 
    <h1>🎂 寿宴邀请函 🎂</h1>
    <h2>喜迎华诞 · 福寿安康</h2>
</div>

<div class="page">
    <img src="mom.jpg" class="photo">
    <h2>岁月温柔 · 优雅如初</h2>
</div>

<div class="page">
    <p>
        时光流转，爱意不变。<br><br>
        愿这一天，她被世界温柔以待
    </p>
</div>

<div class="page">
    <h2 style="color:gold;">诚挚邀请</h2>
    <p>
        📅 2026年3月29日<br><br>
        📍 重庆市九龙坡区西彭镇利川大酒店
    </p>

    <a href="https://uri.amap.com/search?keyword=利川大酒店" 
       style="color:gold;">📍 点击导航</a>
</div>

<div class="page">
    <h2>🥂 共聚一堂 · 同享喜悦</h2>
</div>

<div class="page">
    <h2 style="color:gold;">🎉 恭候光临 🎉</h2>
</div>

<script>
// 页面切换
let pages = document.querySelectorAll('.page');
let current = 0;
let startY = 0;

function update(){
    pages.forEach((p,i)=>{
        p.style.transform = `translateY(${(i-current)*100}%)`;
    });
}
update();

document.addEventListener('touchstart',e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener('touchend',e=>{
    let diff = startY - e.changedTouches[0].clientY;
    if(Math.abs(diff)>50){
        if(diff>0 && current<pages.length-1) current++;
        else if(diff<0 && current>0) current--;
        update();
    }
});

// 音乐淡入
let audio = document.getElementById("bgm");
audio.volume = 0;

function toggleMusic(){
    audio.play();
    let v = 0;
    let fade = setInterval(()=>{
        v += 0.05;
        if(v >= 1){ clearInterval(fade); }
        audio.volume = v;
    },100);
}

// 烟花效果
let canvas = document.getElementById("fireworks");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x,y){
    for(let i=0;i<30;i++){
        particles.push({
            x:x,
            y:y,
            dx:(Math.random()-0.5)*6,
            dy:(Math.random()-0.5)*6,
            life:50
        });
    }
}

setInterval(()=>{
    createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);
},800);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle="gold";
        ctx.fillRect(p.x,p.y,2,2);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
