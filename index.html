<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿宴邀请函</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: "PingFang SC","Microsoft YaHei";
    overflow:hidden;
}

/* 页面 */
.page {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#b30000,#660000);
    color:white;
    text-align:center;
    padding:20px;
    transition:transform 0.6s ease;
    z-index:1;
}

h1 { font-size:34px; color:gold; }
h2 { font-size:24px; margin:10px 0; }
p { font-size:18px; line-height:1.6; }

/* 照片 */
.photo {
    width:240px;
    height:300px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* 音乐按钮 */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: gold;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 🎆 烟花（电影级） */
.fireworks {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 0;
}

.firework {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% {
        transform: translate(0, 0);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 🎆 烟花容器 -->
<div class="fireworks" id="fireworks"></div>

<!-- 🎵 音乐 -->
<div class="music-btn" onclick="toggleMusic()">🎵</div>
<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<!-- 页面 -->
<div class="page">
    <h1>🎂 寿宴邀请函 🎂</h1>
    <h2>喜迎华诞 · 福寿安康</h2>
</div>

<div class="page">
    <img src="mom.jpg" class="photo">
    <h2>岁月温柔 · 优雅如初</h2>
</div>

<div class="page">
    <p>
        时光流转，爱意不变。<br><br>
        妈，这一天<br>
        我想让你成为最幸福的人
    </p>
</div>

<div class="page">
    <h2 style="color:gold;">诚挚邀请</h2>
    <p>
        📅 2026年3月29日<br><br>
        📍 重庆市九龙坡区西彭镇利川大酒店
    </p>
    <a href="https://uri.amap.com/search?keyword=利川大酒店" style="color:gold;">
        📍 点击导航
    </a>
</div>

<div class="page">
    <h2>🥂 共聚一堂 · 同享喜悦</h2>
</div>

<div class="page">
    <h2 style="color:gold;">🎉 恭候光临 🎉</h2>
    <p>不见不散 ✨</p>
</div>

<script>
// 页面滑动（稳定版）
let pages = document.querySelectorAll('.page');
let current = 0;
let startY = 0;
let isMoving = false;

function update(){
    pages.forEach((p,i)=>{
        p.style.transform = `translateY(${(i-current)*100}%)`;
    });
}
update();

document.addEventListener('touchstart',e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener('touchend',e=>{
    if(isMoving) return;

    let diff = startY - e.changedTouches[0].clientY;

    if(Math.abs(diff)>50){
        isMoving = true;

        if(diff>0 && current<pages.length-1) current++;
        else if(diff<0 && current>0) current--;

        update();

        setTimeout(()=>{ isMoving=false; },500);
    }
});

// 音乐淡入
let audio = document.getElementById("bgm");
audio.volume = 0;

function toggleMusic(){
    audio.play();
    let v = 0;
    let fade = setInterval(()=>{
        v += 0.05;
        if(v >= 1){ clearInterval(fade); }
        audio.volume = v;
    },100);
}

document.body.addEventListener("click",()=>{
    audio.play().catch(()=>{});
});

// 🎆 烟花（电影级）
function createFirework() {
    const container = document.getElementById("fireworks");

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight * 0.5;

    for (let i = 0; i < 25; i++) {
        let p = document.createElement("div");
        p.className = "firework";

        let angle = Math.random() * 2 * Math.PI;
        let distance = Math.random() * 80 + 40;

        let dx = Math.cos(angle) * distance;
        let dy = Math.sin(angle) * distance;

        p.style.left = x + "px";
        p.style.top = y + "px";

        p.style.setProperty('--x', dx + "px");
        p.style.setProperty('--y', dy + "px");

        p.style.background = Math.random() > 0.5 ? "gold" : "#ff4d4d";

        container.appendChild(p);

        setTimeout(()=>{ p.remove(); },1000);
    }
}

setInterval(()=>{
    createFirework();
},700);
</script>

</body>
</html>
