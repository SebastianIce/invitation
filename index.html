<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿宴邀请函</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: "PingFang SC","Microsoft YaHei";
    overflow:hidden;
}

/* 页面容器 */
.container {
    position:relative;
    width:100%;
    height:100vh;
}

/* 页面 */
.page {
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#b30000,#660000);
    color:white;
    text-align:center;
    padding:20px;
    transition:transform 0.5s ease;
}

/* 标题 */
h1 { font-size:34px; color:gold; margin-bottom:20px; }
h2 { font-size:24px; margin-bottom:15px; }
p { font-size:18px; line-height:1.6; }

/* 照片 */
.photo {
    width:240px;
    height:300px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    margin-bottom:20px;
}

/* 音乐按钮 */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: gold;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

/* 粒子 */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="music-btn" onclick="toggleMusic()">🎵</div>
<audio id="bgm" loop>
    <source src="https://www.w3schools.com/html/horse.mp3">
</audio>

<div class="container" id="container">

<!-- 页面 -->
<div class="page"> 
    <h1>🎂 寿宴邀请函 🎂</h1>
    <h2>喜迎华诞 · 福寿安康</h2>
</div>

<div class="page">
    <img src="mom.jpg" class="photo">
    <h2>岁月温柔 · 优雅如初</h2>
</div>

<div class="page">
    <p>
        时光流转，爱意不变。<br><br>
        她用一生守护我们<br>
        愿与您共享这份幸福
    </p>
</div>

<div class="page">
    <h2 style="color:gold;">诚挚邀请</h2>
    <p>
        📅 2026年3月29日<br><br>
        📍 重庆市九龙坡区西彭镇利川大酒店
    </p>
</div>

<div class="page">
    <h2>🥂 共聚一堂 · 同享喜悦</h2>
</div>

<div class="page">
    <h2 style="color:gold;">🎉 恭候光临 🎉</h2>
</div>

</div>

<script>
// 页面滑动控制（核心）
let pages = document.querySelectorAll('.page');
let current = 0;
let startY = 0;
let isMoving = false;

// 初始化位置
function updatePages() {
    pages.forEach((p, i) => {
        p.style.transform = `translateY(${(i - current) * 100}%)`;
    });
}
updatePages();

// 触摸开始
document.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
});

// 触摸结束
document.addEventListener('touchend', e => {
    if (isMoving) return;

    let endY = e.changedTouches[0].clientY;
    let diff = startY - endY;

    if (Math.abs(diff) > 50) {
        isMoving = true;

        if (diff > 0 && current < pages.length - 1) {
            current++;
        } else if (diff < 0 && current > 0) {
            current--;
        }

        updatePages();

        setTimeout(() => {
            isMoving = false;
        }, 500);
    }
});

// 音乐
let audio = document.getElementById("bgm");
function toggleMusic(){
    if(audio.paused){ audio.play(); }
    else { audio.pause(); }
}

document.body.addEventListener("click", () => {
    audio.play().catch(()=>{});
});

// 粒子
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="gold";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.y += 0.5;
        if(p.y > canvas.height) p.y = 0;
    });
}

setInterval(draw,30);
</script>

</body>
</html>
